# Experiment 7: Governance policy with lowered escalation threshold.
# The default governance.yaml blocks transitions on drift_level: [critical],
# but the drift agent only produces none/low/medium/high — never critical.
# This policy lowers the threshold to [high] so Tier 2/3 escalation can
# actually be triggered during the experiment.
mode: YOLO

rules:
  - when:
      drift_level: [medium, high]
      drift_type: contradiction
    action: open_investigation

  - when:
      drift_level: [medium, high]
      drift_type: goal
    action: request_goal_refresh

  - when:
      drift_level: [high]
      drift_type: factual
    action: request_source_refresh

  - when:
      drift_level: [high]
      drift_type: entropy
    action: halt_and_review

transition_rules:
  - from: DriftChecked
    to: ContextIngested
    block_when:
      drift_level: [high]
    reason: "High drift blocks cycle reset — requires human override or LLM review"

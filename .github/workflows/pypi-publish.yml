# Filename MUST match Trusted Publishing on PyPI: `pypi-publish.yml`
# Repo: DealExMachina/open-governed-swarm-of-agents.
# Uses GitHub Environment `pypi-publish` — name must match what you set on PyPI (if any).

name: Publish sgrs-client (PyPI)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + twine check only; skip upload"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        working-directory: packages/sgrs-client-py
        run: python -m build

      - name: Validate distributions
        working-directory: packages/sgrs-client-py
        run: python -m twine check dist/*

      - name: Publish to PyPI
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sgrs-client-py/dist/

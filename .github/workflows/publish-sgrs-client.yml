# Requires GitHub Environment `npm-publish` with secret NPM_TOKEN (classic automation token
# with publish rights for the @sgrs scope), or whatever secret name your env uses — set
# NODE_AUTH_TOKEN mapping below if different.

name: Publish @sgrs/sgrs-client (npm)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run only (no registry upload)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @sgrs/sgrs-client build

      - name: Publish to npm (dry run)
        if: inputs.dry_run
        working-directory: packages/sgrs-client
        run: npm publish --access public --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: packages/sgrs-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

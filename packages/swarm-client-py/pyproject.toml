[project]
name = "swarm-control-plane"
version = "0.1.0"
description = "Python client for Governed Swarm control plane /v1 API"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27", "pydantic>=2.0"]

[project.optional-dependencies]
nats = ["nats-py>=2.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/swarm_control_plane"]
